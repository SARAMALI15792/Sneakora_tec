<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Skechers Store</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/loader.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo"><a href="index.html"><img src="images/logo_skh.png" alt="SKH Logo" class="navbar-logo"></a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="category.html">Categories</a></li>
            <li><a href="category.html">Collection</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
        <div class="nav-actions">
            <button id="loginBtn" class="btn-primary">Login</button>
            <a href="cart.html" class="cart-icon active">🛒 <span id="cartCount">0</span></a>
        </div>
    </nav>

    <div class="container" style="padding-top: 120px; padding-bottom: 50px; max-width: 1000px; margin: 0 auto;">
        <h1>Shopping Cart</h1>

        <div class="cart-layout" style="display: flex; gap: 50px; margin-top: 30px; flex-wrap: wrap;">
            <!-- Cart Items -->
            <div class="cart-items" id="cart-items-container" style="flex: 2; min-width: 300px;">
                <p>Loading cart...</p>
            </div>

            <!-- Summary -->
            <div class="cart-summary"
                style="flex: 1; background: #f9f9f9; padding: 30px; border-radius: 15px; height: fit-content; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
                <h2>Summary</h2>
                <div style="display: flex; justify-content: space-between; margin: 20px 0;">
                    <span>Subtotal</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin: 20px 0;">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <hr style="border-color: #eee;">
                <div
                    style="display: flex; justify-content: space-between; margin: 20px 0; font-size: 20px; font-weight: bold;">
                    <span>Total</span>
                    <span id="total">$0.00</span>
                </div>
                <button onclick="checkout()" class="btn-primary" style="width: 100%; padding: 15px;">Checkout</button>
            </div>
        </div>
    </div>

    <!-- Login Modal (Reused) -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="loginForm">
                <h2>Login</h2>
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button onclick="login()">Login</button>
                <p>New here? <a href="#" onclick="toggleAuthMode()">Register</a></p>
            </div>
            <div id="registerForm" style="display:none;">
                <h2>Register</h2>
                <input type="text" id="regName" placeholder="Name">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Password">
                <button onclick="register()">Register</button>
                <p>Already a member? <a href="#" onclick="toggleAuthMode()">Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCart();
        });

        // Build one cart item row using DOM (safe, no innerHTML injection)
        function buildCartRow(name, category, image, price, removeId, mode) {
            const row = document.createElement('div');
            row.className = 'cart-item';
            row.style.cssText = 'display:flex;gap:20px;margin-bottom:20px;background:white;padding:15px;border-radius:10px;align-items:center;box-shadow:0 2px 5px rgba(0,0,0,0.05);';

            const img = document.createElement('img');
            img.src = image;
            img.onerror = () => { img.src = 'images/shoe_texture.png'; };
            img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:5px;';

            const info = document.createElement('div');
            info.style.flex = '1';

            const nameEl = document.createElement('h3');
            nameEl.textContent = name;

            const catEl = document.createElement('p');
            catEl.textContent = category;
            catEl.style.color = '#666';

            info.appendChild(nameEl);
            info.appendChild(catEl);

            const priceEl = document.createElement('div');
            priceEl.textContent = '$' + parseFloat(price).toFixed(2);
            priceEl.style.fontWeight = 'bold';

            const btn = document.createElement('button');
            btn.textContent = 'Remove';
            btn.style.cssText = 'background:#ff4444;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;';
            btn.addEventListener('click', () => removeFromCart(removeId, mode));

            row.appendChild(img);
            row.appendChild(info);
            row.appendChild(priceEl);
            row.appendChild(btn);
            return row;
        }

        async function loadCart() {
            const container = document.getElementById('cart-items-container');
            const user = JSON.parse(localStorage.getItem('user'));

            if (user) {
                // Logged in — load from MySQL
                try {
                    const res = await fetch('/api/cart/' + user.id);
                    const cartItems = await res.json();

                    container.textContent = '';

                    if (cartItems.length === 0) {
                        const msg = document.createElement('p');
                        msg.textContent = 'Your cart is empty.';
                        container.appendChild(msg);
                        updateSummary(0);
                        return;
                    }

                    cartItems.forEach(item => {
                        // item.id = cart_items.id (used to delete the specific row)
                        container.appendChild(
                            buildCartRow(item.name, item.category, item.image, item.price, item.id, 'db')
                        );
                    });

                    const total = cartItems.reduce((sum, item) => sum + parseFloat(item.price), 0);
                    updateSummary(total);

                    // Keep localStorage count in sync with MySQL
                    localStorage.setItem('cart', JSON.stringify(cartItems.map(i => i.product_id)));
                    updateCartCount();

                } catch (e) {
                    console.error('Error loading cart from database', e);
                    container.textContent = 'Error loading cart. Please refresh.';
                }

            } else {
                // Guest — load from localStorage
                const cartIds = JSON.parse(localStorage.getItem('cart') || '[]');
                container.textContent = '';

                if (cartIds.length === 0) {
                    const msg = document.createElement('p');
                    msg.textContent = 'Your cart is empty.';
                    container.appendChild(msg);
                    updateSummary(0);
                    return;
                }

                try {
                    const res = await fetch('/api/products');
                    const allProducts = await res.json();
                    const cartProducts = cartIds.map(id => allProducts.find(p => p.id == id)).filter(Boolean);

                    cartProducts.forEach((p, index) => {
                        container.appendChild(
                            buildCartRow(p.name, p.category, p.image, p.price, index, 'local')
                        );
                    });

                    const total = cartProducts.reduce((sum, p) => sum + parseFloat(p.price), 0);
                    updateSummary(total);

                } catch (e) {
                    console.error('Error loading cart', e);
                }
            }
        }

        async function removeFromCart(id, mode) {
            if (mode === 'db') {
                // id = cart_items.id — delete this specific row from MySQL
                await fetch('/api/cart/' + id, { method: 'DELETE' });
            } else {
                // id = array index in localStorage
                const cart = JSON.parse(localStorage.getItem('cart') || '[]');
                cart.splice(id, 1);
                localStorage.setItem('cart', JSON.stringify(cart));
            }
            loadCart();
            updateCartCount();
        }

        function updateSummary(total) {
            document.getElementById('subtotal').textContent = '$' + total.toFixed(2);
            document.getElementById('total').textContent = '$' + total.toFixed(2);
        }

        async function checkout() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                alert('Please login to place an order.');
                return;
            }

            try {
                // Read cart from MySQL — single source of truth for logged-in users
                const cartRes = await fetch('/api/cart/' + user.id);
                const cartItems = await cartRes.json();

                if (cartItems.length === 0) {
                    alert('Cart is empty!');
                    return;
                }

                const total = cartItems.reduce((sum, item) => sum + parseFloat(item.price), 0);
                const items = cartItems.map(item => ({ product_id: item.product_id, price: item.price }));

                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: user.id, items, total: total.toFixed(2) })
                });

                if (res.ok) {
                    localStorage.removeItem('cart');
                    updateCartCount();
                    alert('Order Placed Successfully!');
                    window.location.href = 'profile.html';
                } else {
                    alert('Error placing order. Please try again.');
                }
            } catch (e) {
                alert('Error placing order. Please try again.');
            }
        }
    </script>
</body>

</html>
