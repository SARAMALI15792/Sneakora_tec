<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Skechers Store</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/loader.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo"><a href="index.html"><img src="images/logo_skh.png" alt="SKH Logo" class="navbar-logo"></a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="category.html">Categories</a></li>
            <li><a href="category.html">Collection</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
        <div class="nav-actions">
            <button id="loginBtn" class="btn-primary">Login</button>
            <a href="cart.html" class="cart-icon">🛒 <span id="cartCount">0</span></a>
        </div>
    </nav>

    <div class="container" style="padding-top: 120px; padding-bottom: 50px; max-width: 800px; margin: 0 auto;">
        <h1>My Profile</h1>

        <div class="profile-card"
            style="background: #f9f9f9; padding: 30px; border-radius: 15px; margin-top: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
            <div style="display: flex; align-items: center; gap: 20px;">
                <div
                    style="width: 80px; height: 80px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px;">
                    👤
                </div>
                <div>
                    <h2 id="userName">Guest User</h2>
                    <p id="userEmail" style="color: #666;">Please login to view details</p>
                </div>
            </div>

            <hr style="border-color: #eee; margin: 30px 0;">

            <h3>Order History</h3>
            <div id="order-list" style="margin-top: 20px;">
                <p style="color: #666;">No orders found.</p>
            </div>
        </div>
    </div>

    <!-- Login Modal (Reused) -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="loginForm">
                <h2>Login</h2>
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button onclick="login()">Login</button>
                <p>New here? <a href="#" onclick="toggleAuthMode()">Register</a></p>
            </div>
            <div id="registerForm" style="display:none;">
                <h2>Register</h2>
                <input type="text" id="regName" placeholder="Name">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Password">
                <button onclick="register()">Register</button>
                <p>Already a member? <a href="#" onclick="toggleAuthMode()">Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/app.js"></script>
    <script>
        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userEmail').textContent = user.email;

                try {
                    const res = await fetch(`/api/orders/${user.id}`);
                    const orders = await res.json();
                    const container = document.getElementById('order-list');

                    if (!orders.length) {
                        container.textContent = 'No orders found.';
                        return;
                    }

                    const grouped = orders.reduce((acc, row) => {
                        if (!acc[row.id]) acc[row.id] = { ...row, items: [] };
                        acc[row.id].items.push({ name: row.product_name, image: row.image, price: row.price });
                        return acc;
                    }, {});

                    container.innerHTML = Object.values(grouped).map(order => `
                        <div style="background:white;padding:15px;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                            <div style="display:flex;justify-content:space-between;">
                                <strong>Order #${esc(String(order.id))}</strong>
                                <span style="color:#28a745;text-transform:capitalize;">${esc(order.status)}</span>
                            </div>
                            <p style="color:#666;font-size:14px;">Placed on ${esc(new Date(order.created_at).toLocaleDateString())}</p>
                            <p style="font-weight:bold;">Total: $${esc(String(order.total))}</p>
                            <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;">
                                ${order.items.map(item => `
                                    <div style="display:flex;align-items:center;gap:8px;background:#f9f9f9;padding:8px;border-radius:8px;">
                                        <img src="${esc(item.image)}" style="width:40px;height:40px;object-fit:cover;border-radius:5px;">
                                        <span style="font-size:13px;">${esc(item.name)} — $${esc(String(item.price))}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('');
                } catch (e) {
                    document.getElementById('order-list').textContent = 'Could not load orders.';
                }
            }
        });
    </script>
</body>

</html>
